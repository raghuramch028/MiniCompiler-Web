<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MiniCompiler & MIPS Translator</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="background-elements">
        <div class="blob blob1"></div>
        <div class="blob blob2"></div>
    </div>
    
    <div class="app-container glass">
        <header>
            <h1>Code<span>Engine</span></h1>
            <p>MiniCompiler & VM-to-MIPS Translator</p>
        </header>

        <div class="tabs">
            <button class="tab-btn active" data-tab="compile-tab">Compile (Src &rarr; VM)</button>
            <button class="tab-btn" data-tab="translate-tab">Translate (VM &rarr; MIPS)</button>
        </div>

        <div class="tab-content active" id="compile-tab">
            <div class="editor-section">
                <div class="panel input-panel">
                    <div class="panel-header">Source Code (MiniLanguage)</div>
                    <textarea id="compile-input" placeholder="Enter your program here..." spellcheck="false"></textarea>
                    <button class="action-btn" id="btn-compile">
                        <span>Compile to VM</span>
                        <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
                    </button>
                </div>
                <div class="panel output-panel">
                    <div class="panel-header">VM Output</div>
                    <div class="output-container">
                        <pre id="compile-output" class="output-content">Waiting for compilation...</pre>
                    </div>
                </div>
            </div>
        </div>

        <div class="tab-content" id="translate-tab">
            <div class="editor-section">
                <div class="panel input-panel">
                    <div class="panel-header">VM Code</div>
                    <textarea id="translate-input" placeholder="Paste VM commands here..." spellcheck="false"></textarea>
                    <button class="action-btn" id="btn-translate">
                        <span>Translate to MIPS</span>
                        <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"></path><path d="m12 5 7 7-7 7"></path></svg>
                    </button>
                </div>
                <div class="panel output-panel">
                    <div class="panel-header">MIPS Assembly Output</div>
                    <div class="output-container">
                        <pre id="translate-output" class="output-content">Waiting for translation...</pre>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
